<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechSpecsHub — Technical Specs, Error Codes & Repair Data</title>
  <meta name="description" content="The definitive reference for portable power station specs, hybrid battery parameters, drone motor data, and fault code diagnostics. Verified against official OEM documentation.">
  <meta name="theme-color" content="#0a1628">
  <link rel="canonical" href="https://zhang1-CPU.github.io/techhub/">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 950:'#0a1628', 900:'#0f1d32', 800:'#162544', 700:'#1e3259' },
            electric: { 300:'#67e8f9', 400:'#00d4ff', 500:'#00b8e6', 600:'#0099cc' }
          },
          fontFamily: {
            display: ['Space Grotesk','system-ui','sans-serif'],
            mono:    ['JetBrains Mono','monospace'],
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/main.css">

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "TechSpecsHub",
    "url": "https://zhang1-CPU.github.io/techhub/",
    "description": "Technical specification database and fault-diagnosis reference for portable power stations, hybrid batteries, drones, and smart home devices.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": { "@type": "EntryPoint", "urlTemplate": "https://zhang1-CPU.github.io/techhub/search?q={search_term_string}" },
      "query-input": "required name=search_term_string"
    },
    "publisher": {
      "@type": "Organization",
      "name": "TechSpecsHub",
      "url": "https://zhang1-CPU.github.io/techhub/",
      "logo": { "@type": "ImageObject", "url": "https://zhang1-CPU.github.io/techhub/assets/images/logo.png" }
    }
  }
  </script>
</head>
<body class="bg-navy-950 text-white min-h-screen">
